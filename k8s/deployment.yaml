apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlan-middleware
  namespace: atlan-middleware
  labels:
    app.kubernetes.io/name: atlan-requests-middleware
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: atlan-requests-middleware
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atlan-requests-middleware
        app.kubernetes.io/component: api
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: atlan-middleware-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: atlan-middleware
        image: ghcr.io/your-org/atlan-requests-test:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        # Load configuration from ConfigMap
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: AWS_REGION
        - name: S3_KEY_PREFIX
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: S3_KEY_PREFIX
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: LOG_LEVEL
        - name: MAX_BODY_SIZE
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: MAX_BODY_SIZE
        - name: ENABLE_MIDDLEWARE
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: ENABLE_MIDDLEWARE
        - name: S3_UPLOAD_TIMEOUT
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: S3_UPLOAD_TIMEOUT
        - name: LOG_ENDPOINTS
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: LOG_ENDPOINTS
        - name: LOG_METHODS
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: LOG_METHODS
        - name: ENDPOINT_MATCH_TYPE
          valueFrom:
            configMapKeyRef:
              name: atlan-middleware-config
              key: ENDPOINT_MATCH_TYPE
        # Load sensitive data from Secret
        - name: AWS_ROLE_ARN
          valueFrom:
            secretKeyRef:
              name: atlan-middleware-secret
              key: AWS_ROLE_ARN
        - name: S3_BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: atlan-middleware-secret
              key: S3_BUCKET_NAME
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30