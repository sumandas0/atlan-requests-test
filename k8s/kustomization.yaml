apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: atlan-middleware
  
namespace: atlan-middleware

resources:
- namespace.yaml
- serviceaccount.yaml
- configmap.yaml
- secret.yaml
- deployment.yaml
- service.yaml
- ingress.yaml
- hpa.yaml
- networkpolicy.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: atlan-requests-middleware
  app.kubernetes.io/part-of: atlan-platform
  
# Images to be used (replace with your GHCR path)
images:
- name: ghcr.io/your-org/atlan-requests-test
  newTag: latest

# ConfigMap generator for additional configs if needed
# configMapGenerator:
# - name: app-config
#   files:
#   - config.yaml

# Patches for different environments
patchesStrategicMerge: []

# Patches using JSON6902
patches: []