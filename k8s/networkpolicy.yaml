apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: atlan-middleware-netpol
  namespace: atlan-middleware
  labels:
    app.kubernetes.io/name: atlan-requests-middleware
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: atlan-requests-middleware
      app.kubernetes.io/component: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 8000
  # Allow ingress from same namespace (for service mesh, monitoring, etc.)
  - from:
    - namespaceSelector:
        matchLabels:
          name: atlan-middleware
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow egress to AWS services (S3, STS)
  - {}  # Allow all egress for AWS API calls
  # In production, you might want to restrict this to specific IPs/ranges
  # - to:
  #   - ipBlock:
  #       cidr: 0.0.0.0/0
  #       except:
  #       - 169.254.169.254/32  # Prevent access to metadata service
  #   ports:
  #   - protocol: TCP
  #     port: 443