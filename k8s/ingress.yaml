apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlan-middleware-ingress
  namespace: atlas
  labels:
    app: atlan-middleware
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  rules:
  - host: atlan-middleware.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlan-middleware-service
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlan-middleware-ingress-ssl
  namespace: atlas
  labels:
    app: atlan-middleware
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.atlan-middleware.com
    secretName: atlan-middleware-tls
  rules:
  - host: api.atlan-middleware.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: atlan-middleware-service
            port:
              number: 80