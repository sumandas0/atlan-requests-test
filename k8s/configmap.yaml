apiVersion: v1
kind: ConfigMap
metadata:
  name: atlan-middleware-config
  namespace: atlan-middleware
  labels:
    app.kubernetes.io/name: atlan-requests-middleware
    app.kubernetes.io/component: config
data:
  # AWS Configuration (non-sensitive)
  AWS_REGION: "us-east-1"
  
  # S3 Configuration (non-sensitive)
  S3_KEY_PREFIX: "request-logs/"
  
  # Application Configuration
  LOG_LEVEL: "INFO"
  MAX_BODY_SIZE: "1048576"
  ENABLE_MIDDLEWARE: "true"
  S3_UPLOAD_TIMEOUT: "30"
  
  # Selective Logging Configuration
  LOG_ENDPOINTS: '["\/search\/indexsearch", "\/entity\/lineage"]'
  LOG_METHODS: '["POST"]'
  ENDPOINT_MATCH_TYPE: "exact"